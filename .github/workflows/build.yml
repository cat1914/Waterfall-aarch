name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          # archivesName = mod_id = "waterfall_aarch", version = mod_version
          # -> build/libs/waterfall_aarch-<version>.jar
          name: waterfall_aarch-${{ github.sha }}
          path: build/libs/waterfall_aarch-*.jar
          if-no-files-found: error
          retention-days: 30
